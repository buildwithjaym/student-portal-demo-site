name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 16 * * 1'  # Tuesday in local time (UTC+8)
    - cron: '0 16 * * 4'  # Friday in local time (UTC+8)
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase Database
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/pings?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}"